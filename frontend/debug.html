<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <title>Debug Mode</title>
  </head>
  <body>
    <h1>Debug Log</h1>
    <pre id="log" style="background: #222; color: #0f0; padding: 1rem;"></pre>
    <div id="root"></div>
    <script>
      window.onerror = function(msg, url, lineNo, columnNo, error) {
        document.getElementById('log').textContent += msg + '\n' + (error && error.stack) + '\n\n';
      };
      window.addEventListener('unhandledrejection', function(event) {
        document.getElementById('log').textContent += 'Unhandled Rejection: ' + event.reason + '\n\n';
      });
      console.log = function(...args) {
        document.getElementById('log').textContent += args.join(' ') + '\n';
      };
      console.error = function(...args) {
        document.getElementById('log').textContent += 'ERROR: ' + args.join(' ') + '\n';
      };
    </script>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
